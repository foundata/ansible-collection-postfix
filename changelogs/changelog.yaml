---
ancestor: null
releases:
  1.3.0:
    changes:
      bugfixes:
        - '``foundata.postfix.run`` - Fixed uninstallation failure on Fedora 43/44
          (and potentially other platforms in the future) caused by DNF dependency
          resolution errors. Map backend packages (e.g. ``postfix-pcre``) installed
          during setup were not included in the removal list, preventing the base
          ``postfix`` package from being removed. All map backend packages are now
          included in ``__run_postfix_packages_uninstall`` and removed together with
          the base package.

          '
      minor_changes:
        - 'Added Fedora 44 as supported platform for all collection roles and Molecule
          test scenarios.

          '
        - 'Added Ubuntu 26.04 LTS (Resolute Raccoon) as supported platform for all
          collection roles and Molecule test scenarios.

          '
      release_summary: 'Release Date: 2026-05-10


        Maintenance and bugfix release.

        '
      removed_features:
        - 'Removed Fedora 42 support (End of Life, EOL) from collection roles and
          Molecule scenarios. The collection may still work on Fedora 42, but no testing
          or bugfixes will be provided. A warning will be displayed when used on unsupported
          platforms.

          '
    fragments:
      - 1.3.0-release.yaml
      - fix-uninstall-fedora43-fedora44.yaml
      - platform-update-add-fedora44-remove-fedora42.yaml
      - platform-update-add-ubuntu2604.yaml
    release_date: '2026-05-10'
  1.2.0:
    changes:
      minor_changes:
        - Added Fedora 43 as supported platform for all collection roles and Molecule
          test scenarios
      release_summary: 'Release Date: 2025-12-26


        Maintenance release.

        '
      removed_features:
        - Removed Fedora 41 support (End of Life, EOL) from collection roles and Molecule
          scenarios. The collection may still work on Fedora 41, but no testing or
          bugfixes will be provided. A warning will be displayed when used on unsupported
          platforms.
    fragments:
      - 1.2.0-release.yaml
      - platform-update-add-fedora-43-remove-fedora-41.yaml
    release_date: '2025-12-26'
  1.1.0:
    changes:
      minor_changes:
        - 'Molecule: Added Debian 13 (Trixie) as a test target platform.'
        - Prevent duplicate alias declarations by commenting out previously existing
          aliases in the lookup-table when they are also defined in ``run_postfix_aliases_map``
          or ``__run_postfix_aliases_map_defaults``.
        - '``foundata.postfix.run``: Added Debian 13 (Trixie) as a supported platform.'
      release_summary: 'Release Date: 2025-11-02


        Maintenance release.

        '
      removed_features:
        - 'Molecule: Removed Debian 11 (Bullseye) as a test target platform.'
        - '``foundata.postfix.run``: Removed Debian 11 (Bullseye) from the list of
          supported platforms. The role will continue to work on Debian 11 but will
          display a warning. To avoid this, either remain on or pin the previous version
          of the collection. Bugs and issues related to Debian 11 will no longer be
          fixed.'
    fragments:
      - 1.1.0-release.yaml
      - platform-add-debian-13-remove-debian-11.yaml
      - prevent-duplicate-alias-declarations.yaml
    release_date: '2025-11-02'
  1.0.0:
    changes:
      release_summary: 'Release Date: 2025-05-30


        First public release, providing all functionality and files.

        '
    fragments:
      - 1.0.0-release.yaml
    release_date: '2025-05-30'
