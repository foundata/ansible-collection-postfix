---

bugfixes:
  - >
    ``foundata.postfix.run`` - Fixed uninstallation failure on Fedora 43/44
    (and potentially other platforms in the future) caused by DNF dependency
    resolution errors. Map backend packages (e.g. ``postfix-pcre``) installed
    during setup were not included in the removal list, preventing the base
    ``postfix`` package from being removed. All map backend packages are now
    included in ``__run_postfix_packages_uninstall`` and removed together
    with the base package.
