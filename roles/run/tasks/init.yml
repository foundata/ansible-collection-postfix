# Initialization: Manage internal role setup and the Ansible environment.

---

- name: "Init | Gather role-specific facts"
  ansible.builtin.setup:
    gather_subset: "{{ __run_postfix_used_facts }}"
  when:
    - not (__run_postfix_used_facts is subset(ansible_facts.keys()))


- name: "Init | Include role meta data"
  ansible.builtin.include_vars:
    file: "../meta/main.yml"
    name: "__run_postfix_meta"


- name: "Init | Check Ansible version requirement and fail if unmet"
  ansible.builtin.fail:
    msg: >
      This role requires Ansible {{ __run_postfix_meta['galaxy_info']['min_ansible_version'] }}
      or higher. You are currently running Ansible {{ ansible_version['full'] }} .
  when:
    - ansible_version['full'] is version_compare(__run_postfix_meta['galaxy_info']['min_ansible_version'], '<')


- name: "Init | Notify when platform support check is not possible"
  ansible.builtin.debug:
    msg: >
      The list of supported platforms cannot be checked as it is either empty
      or distribution facts are missing.
    verbosity: 1
  when:
    - ansible_facts['os_family'] is not ansible.builtin.defined or
      ansible_facts['distribution'] is not ansible.builtin.defined or
      ansible_facts['distribution_version'] is not ansible.builtin.defined or
      ansible_facts['distribution_major_version'] is not ansible.builtin.defined or
      ((__run_postfix_supported_platforms | ansible.builtin.length) == 0)


- name: "Init | Warn when platform is unsupported"
  ansible.builtin.fail:
    msg: >
      Neither {{ ansible_facts['distribution'] }} (distribution) nor {{ ansible_facts['os_family'] }} (os_family)
      with versions '{{ ansible_facts['distribution_major_version'] }}', '{{ ansible_facts['distribution_version'] }}',
      or 'all' is in the list of supported platforms from vars/main.yml: {{ __run_postfix_supported_platforms }}
  vars:
    __run_postfix_platform_names_regex: >-
      ^({{ ansible_facts['distribution'] }}|{{ ansible_facts['os_family'] }})$
    __run_postfix_platform_versions_regex: >-
      ^({{ ansible_facts['distribution_major_version'] }}|{{ ansible_facts['distribution_version'] }}|all)$
    __run_postfix_matched_versions: >-
      {{
        __run_postfix_supported_platforms
        | ansible.builtin.selectattr('name', 'match', __run_postfix_platform_names_regex, ignorecase=true)
        | ansible.builtin.map(attribute='versions')
        | ansible.builtin.flatten
        | ansible.builtin.select('match', __run_postfix_platform_versions_regex, ignorecase=true)
        | ansible.builtin.list
      }}
  when:
    - (__run_postfix_supported_platforms | ansible.builtin.length) > 0
    - (__run_postfix_matched_versions | ansible.builtin.length) == 0
  ignore_errors: true # noqa: ignore-errors


- name: "Init | Set platform-specific filename list (most to least specific; raw with possible duplicates)"
  ansible.builtin.set_fact:
    __run_postfix_platform_filenames_raw:
      - "{{ __run_postfix_dist }}_{{ __run_postfix_dist_ver }}.yml"
      - "{{ __run_postfix_dist }}_{{ __run_postfix_dist_major }}.yml"
      - "{{ __run_postfix_dist }}.yml"
      - "{{ __run_postfix_os_family }}.yml"
  vars:
    __run_postfix_dist: >-
      {{
        ansible_facts['distribution']
        | ansible.builtin.regex_replace(' ', '_')
        | ansible.builtin.lower
      }}
    __run_postfix_dist_ver: >-
      {{
        ansible_facts['distribution_version']
        | ansible.builtin.regex_replace(' ', '_')
        | ansible.builtin.lower
      }}
    __run_postfix_dist_major: >-
      {{
        ansible_facts['distribution_major_version']
        | ansible.builtin.regex_replace(' ', '_')
        | ansible.builtin.lower
      }}
    __run_postfix_os_family: >-
      {{
        ansible_facts['os_family']
        | ansible.builtin.regex_replace(' ', '_')
        | ansible.builtin.lower
      }}


- name: "Init | Set unique platform-specific filename list (most to least specific)"
  ansible.builtin.set_fact:
    __run_postfix_platform_filenames_most_specific_first: >-
      {{
        (__run_postfix_platform_filenames_raw
        | ansible.builtin.unique
        | ansible.builtin.default([]))
      }}


- name: "Init | Set unique platform-specific filename list (least to most specific)"
  ansible.builtin.set_fact:
    __run_postfix_platform_filenames_most_specific_last: >-
      {{
        __run_postfix_platform_filenames_most_specific_first
        | ansible.builtin.reverse
      }}


- name: "Init | Include platform-specific variables (if any), overwrite values with more specific ones"
  ansible.builtin.include_vars:
    file: "{{ __run_postfix_vars_file }}"
  vars:
    __run_postfix_vars_file: "{{ role_path }}/vars/{{ item }}"
  when:
    - __run_postfix_vars_file is ansible.builtin.file
  loop: "{{ __run_postfix_platform_filenames_most_specific_last }}"


### Postfix specific

- name: "Init | Merge user and default main.cf settings"
  # Postfix parameter names are case-sensitive. Since Ansible dict keys are also
  # case-sensitive, a simple dict_a | ansible.builtin.combine(dict_b) correctly
  # allows user settings to override defaults without extra handling.
  #
  # Only __run_postfix_effective_maincf_settings is materialized here:
  # later config tasks repeatedly re-derive it via set_fact (self-combine) to
  # layer in computed main.cf parameters, so it must exist as a host fact before
  # those tasks run. All the other effective merge variables are read-only and
  # are therefore computed lazily in vars/main.yml instead.
  ansible.builtin.set_fact:
    # Main
    __run_postfix_effective_maincf_settings: >-
      {{
        __run_postfix_maincf_settings_defaults
        | ansible.builtin.combine(run_postfix_maincf_settings)
      }}


# The remaining effective merge variables are used read-only, computed lazily
# in vars/main.yml.
- name: "Init | Show effective merged variables (computed lazily in vars/main.yml)"
  ansible.builtin.debug:
    msg: "{{ __run_postfix_effective_var }} = {{ lookup('ansible.builtin.vars', __run_postfix_effective_var) }}"
    verbosity: 3
  loop:
    - "__run_postfix_effective_mastercf_settings"
    - "__run_postfix_effective_relay_domains"
    - "__run_postfix_effective_access_recipient_map"
    - "__run_postfix_effective_access_sender_map"
    - "__run_postfix_effective_aliases_map"
    - "__run_postfix_effective_canonical_recipient_map"
    - "__run_postfix_effective_canonical_sender_map"
    - "__run_postfix_effective_generic_map"
    - "__run_postfix_effective_relocated_map"
    - "__run_postfix_effective_transport_map"
    - "__run_postfix_effective_virtual_alias_domains"
    - "__run_postfix_effective_virtual_alias_map"
    - "__run_postfix_effective_smtp_sasl_password_map"
  loop_control:
    loop_var: "__run_postfix_effective_var"
    label: "{{ __run_postfix_effective_var }}"
